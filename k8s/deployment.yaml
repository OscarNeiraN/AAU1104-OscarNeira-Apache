apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-demo-api
  labels:
    app: apache-demo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache-demo-api
  template:
    metadata:
      labels:
        app: apache-demo-api
    spec:
      containers:
        - name: api
          image: oneiran/apache-demo:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3000"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
